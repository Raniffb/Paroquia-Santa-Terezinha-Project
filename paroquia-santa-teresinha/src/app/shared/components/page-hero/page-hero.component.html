<div class="pst-page-hero" role="banner">
  <div class="pst-page-hero__inner">
    <div class="pst-page-hero__icon-wrap" aria-hidden="true">
      <i [class]="'pi ' + icon"></i>
    </div>
    <div class="pst-page-hero__text">
      <h1 class="pst-page-hero__titulo">{{ titulo }}</h1>
      <p class="pst-page-hero__subtitulo" *ngIf="subtitulo">{{ subtitulo }}</p>
    </div>
  </div>
</div>
