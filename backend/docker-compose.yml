services:
  postgres:
    image: postgres:16-alpine
    container_name: paroquia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paroquia_db
    ports:
      - "5434:5432"
    volumes:
      - paroquia_pgdata:/var/lib/postgresql/data

volumes:
  paroquia_pgdata:
