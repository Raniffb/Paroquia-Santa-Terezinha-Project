<app-page-hero
  icon="pi-book"
  titulo="Notícias"
  subtitulo="Fique por dentro das novidades da paróquia e da diocese">
</app-page-hero>

<div class="pst-page-content">

  <!-- Filtro por categoria -->
  <div
    class="pst-filter"
    role="tablist"
    aria-label="Filtrar notícias por categoria">
    <button
      *ngFor="let f of filtros"
      role="tab"
      class="pst-filter__btn"
      [class.pst-filter__btn--active]="categoriaAtiva === f.valor"
      [attr.aria-selected]="categoriaAtiva === f.valor"
      [attr.aria-label]="'Filtrar por ' + f.label"
      (click)="filtrar(f.valor)">
      {{ f.label }}
    </button>
  </div>

  <!-- Esqueleto enquanto carrega -->
  <div
    *ngIf="carregando"
    class="pst-noticias-grid"
    aria-label="Carregando notícias"
    aria-busy="true">
    <div *ngFor="let n of [1,2,3]" class="pst-noticia-card">
      <div class="pst-noticia-card__header">
        <span class="pst-skeleton pst-skeleton--badge"></span>
        <span class="pst-skeleton pst-skeleton--data"></span>
      </div>
      <span class="pst-skeleton pst-skeleton--titulo"></span>
      <span class="pst-skeleton pst-skeleton--linha"></span>
      <span class="pst-skeleton pst-skeleton--linha-sm"></span>
    </div>
  </div>

  <!-- Lista de notícias -->
  <div
    *ngIf="!carregando && visiveis.length > 0"
    class="pst-noticias-grid"
    aria-live="polite"
    aria-label="Notícias filtradas">

    <article
      *ngFor="let noticia of paginados; let i = index"
      class="pst-noticia-card"
      [class.pst-noticia-card--destaque]="i === 0 && !categoriaAtiva && pagina === 0">

      <div class="pst-noticia-card__header">
        <span class="pst-noticia-card__cat">
          {{ labelCategoria(noticia.categoria) }}
        </span>
        <time class="pst-noticia-card__data" [dateTime]="noticia.data">
          <i class="pi pi-calendar" aria-hidden="true"></i>
          {{ formatarData(noticia.data) }}
        </time>
      </div>

      <h2 class="pst-noticia-card__titulo">{{ noticia.titulo }}</h2>

      <p class="pst-noticia-card__resumo">{{ noticia.resumo }}</p>

      <div class="pst-noticia-card__footer">
        <span *ngIf="noticia.autor" class="pst-noticia-card__autor">
          <i class="pi pi-user" aria-hidden="true"></i>
          {{ noticia.autor }}
        </span>
        <a
          [routerLink]="['/noticias', noticia.id]"
          class="pst-noticia-card__link"
          [attr.aria-label]="'Ler notícia completa: ' + noticia.titulo">
          Ler mais
          <i class="pi pi-arrow-right" aria-hidden="true"></i>
        </a>
      </div>
    </article>
  </div>

  <app-paginador
    *ngIf="!carregando && visiveis.length > 0"
    [total]="visiveis.length"
    [porPagina]="POR_PAGINA"
    [paginaAtual]="pagina"
    (mudouPagina)="mudarPagina($event)">
  </app-paginador>

  <!-- Sem resultados -->
  <div *ngIf="!carregando && visiveis.length === 0" class="pst-empty" role="status" aria-live="polite">
    <i class="pi pi-inbox" aria-hidden="true"></i>
    <p>Nenhuma notícia encontrada para esta categoria.</p>
  </div>
</div>
