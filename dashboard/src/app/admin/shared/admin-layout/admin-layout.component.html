<div class="adm-shell">

  <!-- ── Sidebar (desktop) ─────────────────────────────────────────────── -->
  <nav class="adm-sidebar" aria-label="Menu administrativo">
    <div class="adm-sidebar__brand">
      <span class="adm-sidebar__initials" aria-hidden="true">PST</span>
      <span class="adm-sidebar__title">Admin<br><small>Santa Teresinha</small></span>
    </div>

    <ul class="adm-sidebar__nav" role="list">
      @for (item of navItems; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="adm-sidebar__link--active"
            [routerLinkActiveOptions]="{ exact: item.route === '/admin' }"
            class="adm-sidebar__link"
            [attr.aria-label]="item.label">
            <i [class]="item.icon" aria-hidden="true"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <button class="adm-sidebar__sair" (click)="sair()" type="button" aria-label="Sair do painel">
      <i class="pi pi-sign-out" aria-hidden="true"></i>
      <span>Sair</span>
    </button>
  </nav>

  <!-- ── Drawer overlay (mobile) ──────────────────────────────────────── -->
  @if (drawerAberto()) {
    <div class="adm-drawer-overlay" (click)="fecharDrawer()" aria-hidden="true"></div>
  }

  <nav
    class="adm-drawer"
    [class.adm-drawer--aberto]="drawerAberto()"
    aria-label="Menu administrativo mobile"
    [attr.aria-hidden]="!drawerAberto()">

    <div class="adm-drawer__header">
      <span class="adm-sidebar__initials" aria-hidden="true">PST</span>
      <span class="adm-sidebar__title">Admin<br><small>Santa Teresinha</small></span>
      <button class="adm-drawer__fechar" (click)="fecharDrawer()" type="button" aria-label="Fechar menu">
        <i class="pi pi-times" aria-hidden="true"></i>
      </button>
    </div>

    <ul class="adm-sidebar__nav" role="list">
      @for (item of navItems; track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="adm-sidebar__link--active"
            [routerLinkActiveOptions]="{ exact: item.route === '/admin' }"
            class="adm-sidebar__link"
            (click)="fecharDrawer()"
            [attr.aria-label]="item.label">
            <i [class]="item.icon" aria-hidden="true"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <button class="adm-sidebar__sair" (click)="sair()" type="button" aria-label="Sair do painel">
      <i class="pi pi-sign-out" aria-hidden="true"></i>
      <span>Sair</span>
    </button>
  </nav>

  <!-- ── Main ─────────────────────────────────────────────────────────── -->
  <div class="adm-main">

    <!-- Topbar -->
    <header class="adm-topbar">
      <button
        class="adm-topbar__hamburger"
        (click)="toggleDrawer()"
        type="button"
        [attr.aria-expanded]="drawerAberto()"
        aria-controls="adm-drawer"
        aria-label="Abrir menu">
        <i class="pi pi-bars" aria-hidden="true"></i>
      </button>

      <span class="adm-topbar__titulo" aria-live="polite">Paróquia Santa Teresinha</span>

      <div class="adm-topbar__usuario">
        <i class="pi pi-user" aria-hidden="true"></i>
        <span>{{ nomeUsuario }}</span>
        <button class="adm-topbar__sair" (click)="sair()" type="button" aria-label="Sair do painel">
          <i class="pi pi-sign-out" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <main id="adm-content" class="adm-content" tabindex="-1">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
